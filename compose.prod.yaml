name: address-system-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: address-system:${ADDRESS_SYSTEM_IMAGE_TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      ADDRESS_DB_HOST: ${ADDRESS_DB_HOST:?required}
      ADDRESS_DB_PORT: ${ADDRESS_DB_PORT:?required}
      ADDRESS_DB_NAME: ${ADDRESS_DB_NAME:?required}
      ADDRESS_DB_USER: ${ADDRESS_DB_USER:?required}
      ADDRESS_DB_PASSWORD: ${ADDRESS_DB_PASSWORD:?required}
      ADDRESS_DB_SSL_MODE: ${ADDRESS_DB_SSL_MODE:-verify-full}
      ADDRESS_DB_SSL_ROOT_CERT: /run/secrets/address-db-ca
      ADDRESS_API_CLIENT_ID: ${ADDRESS_API_CLIENT_ID:?required}
      ADDRESS_API_CLIENT_SECRET: ${ADDRESS_API_CLIENT_SECRET:?required}
      ADDRESS_ADMIN_API_CLIENT_ID: ${ADDRESS_ADMIN_API_CLIENT_ID:?required}
      ADDRESS_ADMIN_API_CLIENT_SECRET: ${ADDRESS_ADMIN_API_CLIENT_SECRET:?required}
      ADDRESS_API_RATE_LIMIT_SEARCH_CAPACITY: ${ADDRESS_API_RATE_LIMIT_SEARCH_CAPACITY:?required}
      ADDRESS_API_RATE_LIMIT_SEARCH_REFILL: ${ADDRESS_API_RATE_LIMIT_SEARCH_REFILL:?required}
      ADDRESS_API_RATE_LIMIT_TARGET_CAPACITY: ${ADDRESS_API_RATE_LIMIT_TARGET_CAPACITY:?required}
      ADDRESS_API_RATE_LIMIT_TARGET_REFILL: ${ADDRESS_API_RATE_LIMIT_TARGET_REFILL:?required}
      ADDRESS_API_RATE_LIMIT_COORDINATE_CAPACITY: ${ADDRESS_API_RATE_LIMIT_COORDINATE_CAPACITY:?required}
      ADDRESS_API_RATE_LIMIT_COORDINATE_REFILL: ${ADDRESS_API_RATE_LIMIT_COORDINATE_REFILL:?required}
      ADDRESS_API_RATE_LIMIT_DEFAULT_CAPACITY: ${ADDRESS_API_RATE_LIMIT_DEFAULT_CAPACITY:?required}
      ADDRESS_API_RATE_LIMIT_DEFAULT_REFILL: ${ADDRESS_API_RATE_LIMIT_DEFAULT_REFILL:?required}
      DELIVERY_COORDINATE_MAX_ACCURACY: ${DELIVERY_COORDINATE_MAX_ACCURACY:?required}
      DELIVERY_COORDINATE_MAX_EVENT_AGE: ${DELIVERY_COORDINATE_MAX_EVENT_AGE:?required}
      DELIVERY_COORDINATE_FUTURE_SKEW: ${DELIVERY_COORDINATE_FUTURE_SKEW:?required}
      DELIVERY_COORDINATE_RAW_RETENTION: ${DELIVERY_COORDINATE_RAW_RETENTION:?required}
      COORDINATE_ANALYSIS_ENABLED: ${COORDINATE_ANALYSIS_ENABLED:-true}
      COORDINATE_ANALYSIS_EPS_METERS: ${COORDINATE_ANALYSIS_EPS_METERS:?required}
      COORDINATE_ANALYSIS_MIN_POINTS: ${COORDINATE_ANALYSIS_MIN_POINTS:?required}
      COORDINATE_ANALYSIS_MIN_SAMPLES: ${COORDINATE_ANALYSIS_MIN_SAMPLES:?required}
      COORDINATE_ANALYSIS_WINDOW: ${COORDINATE_ANALYSIS_WINDOW:?required}
      COORDINATE_ANALYSIS_MAX_ATTEMPTS: ${COORDINATE_ANALYSIS_MAX_ATTEMPTS:?required}
      COORDINATE_ANALYSIS_INITIAL_RETRY_DELAY: ${COORDINATE_ANALYSIS_INITIAL_RETRY_DELAY:?required}
      COORDINATE_ANALYSIS_MAX_RETRY_DELAY: ${COORDINATE_ANALYSIS_MAX_RETRY_DELAY:?required}
      COORDINATE_QUALITY_ENABLED: ${COORDINATE_QUALITY_ENABLED:-true}
      COORDINATE_QUALITY_MIN_CANDIDATE_SAMPLES: ${COORDINATE_QUALITY_MIN_CANDIDATE_SAMPLES:?required}
      COORDINATE_QUALITY_FULL_SCORE_SAMPLES: ${COORDINATE_QUALITY_FULL_SCORE_SAMPLES:?required}
      COORDINATE_QUALITY_MAX_RADIUS_METERS: ${COORDINATE_QUALITY_MAX_RADIUS_METERS:?required}
      COORDINATE_QUALITY_MAX_OUTLIER_RATIO: ${COORDINATE_QUALITY_MAX_OUTLIER_RATIO:?required}
      COORDINATE_QUALITY_MIN_DOMINANT_RATIO: ${COORDINATE_QUALITY_MIN_DOMINANT_RATIO:?required}
      COORDINATE_QUALITY_MIN_DOMINANCE_GAP: ${COORDINATE_QUALITY_MIN_DOMINANCE_GAP:?required}
      COORDINATE_QUALITY_MIN_PROMOTION_SCORE: ${COORDINATE_QUALITY_MIN_PROMOTION_SCORE:?required}
      COORDINATE_QUALITY_MIN_REVIEW_SCORE: ${COORDINATE_QUALITY_MIN_REVIEW_SCORE:?required}
      COORDINATE_QUALITY_CONFIRMATION_DISTANCE_METERS: ${COORDINATE_QUALITY_CONFIRMATION_DISTANCE_METERS:?required}
      COORDINATE_QUALITY_MAX_AUTOMATIC_SHIFT_METERS: ${COORDINATE_QUALITY_MAX_AUTOMATIC_SHIFT_METERS:?required}
      COORDINATE_QUALITY_POLICY_VERSION: ${COORDINATE_QUALITY_POLICY_VERSION:?required}
      COORDINATE_QUALITY_MAX_ATTEMPTS: ${COORDINATE_QUALITY_MAX_ATTEMPTS:?required}
      COORDINATE_QUALITY_INITIAL_RETRY_DELAY: ${COORDINATE_QUALITY_INITIAL_RETRY_DELAY:?required}
      COORDINATE_QUALITY_MAX_RETRY_DELAY: ${COORDINATE_QUALITY_MAX_RETRY_DELAY:?required}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:?required}
      NOMINATIM_CONNECT_TIMEOUT: ${NOMINATIM_CONNECT_TIMEOUT:?required}
      NOMINATIM_READ_TIMEOUT: ${NOMINATIM_READ_TIMEOUT:?required}
      NOMINATIM_RETRY_DELAY: ${NOMINATIM_RETRY_DELAY:?required}
      NOMINATIM_MAX_RESULTS: ${NOMINATIM_MAX_RESULTS:?required}
    secrets:
      - address-db-ca
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    restart: unless-stopped

secrets:
  address-db-ca:
    file: ${ADDRESS_DB_SSL_ROOT_CERT_FILE:?required}
