spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${ADDRESS_DB_HOST:localhost}:${ADDRESS_DB_PORT:5432}/${ADDRESS_DB_NAME:address_system}?ApplicationName=address-system
    username: ${ADDRESS_DB_USER:address_app}
    password: ${ADDRESS_DB_PASSWORD:address_local_password}
    hikari:
      pool-name: address-system-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:5000}
      connection-init-sql: SET search_path TO address, public

address:
  api-security:
    client-id: ${ADDRESS_API_CLIENT_ID:local-delivery-system}
    client-secret: ${ADDRESS_API_CLIENT_SECRET:local-development-hmac-secret-change-me}
    rate-limit:
      address-search:
        capacity: ${ADDRESS_API_RATE_LIMIT_SEARCH_CAPACITY:1000}
        refill-tokens-per-second: ${ADDRESS_API_RATE_LIMIT_SEARCH_REFILL:100}
      delivery-target:
        capacity: ${ADDRESS_API_RATE_LIMIT_TARGET_CAPACITY:500}
        refill-tokens-per-second: ${ADDRESS_API_RATE_LIMIT_TARGET_REFILL:50}
      default-policy:
        capacity: ${ADDRESS_API_RATE_LIMIT_DEFAULT_CAPACITY:200}
        refill-tokens-per-second: ${ADDRESS_API_RATE_LIMIT_DEFAULT_REFILL:20}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.address.address_system: ${APP_LOG_LEVEL:DEBUG}
