spring:
  application:
    name: address-system
  profiles:
    default: local
  jackson:
    time-zone: UTC
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: address
    schemas: address
    create-schemas: true
    clean-disabled: true
    validate-on-migrate: true
    baseline-on-migrate: false
    out-of-order: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.address.address_system: ${APP_LOG_LEVEL:INFO}
