spring:
  application:
    name: address-system
  profiles:
    default: local
  jackson:
    time-zone: UTC
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.address.address_system: ${APP_LOG_LEVEL:INFO}
