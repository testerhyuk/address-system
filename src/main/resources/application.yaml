spring:
  application:
    name: address-system
  profiles:
    default: local
  jackson:
    time-zone: UTC
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: address
    schemas: address
    create-schemas: true
    clean-disabled: true
    validate-on-migrate: true
    baseline-on-migrate: false
    out-of-order: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

address:
  import:
    road:
      enabled: ${ROAD_ADDRESS_IMPORT_ENABLED:false}
      file: ${ROAD_ADDRESS_IMPORT_FILE:}
      mode: ${ROAD_ADDRESS_IMPORT_MODE:}
      reference-date: ${ROAD_ADDRESS_IMPORT_REFERENCE_DATE:}
      chunk-size: ${ROAD_ADDRESS_IMPORT_CHUNK_SIZE:2000}
      max-skipped-rows: ${ROAD_ADDRESS_IMPORT_MAX_SKIPPED_ROWS:1000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.address.address_system: ${APP_LOG_LEVEL:INFO}
