name: address-system

services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: ${ADDRESS_DB_NAME:-address_system}
      POSTGRES_USER: ${ADDRESS_DB_USER:-address_app}
      POSTGRES_PASSWORD: ${ADDRESS_DB_PASSWORD:-address_local_password}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${ADDRESS_DB_PORT:-5432}:5432"
    volumes:
      - address-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init/001-enable-postgis.sql:/docker-entrypoint-initdb.d/001-enable-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    stop_grace_period: 30s
    shm_size: 256mb
    restart: unless-stopped
    networks:
      - address-backend

volumes:
  address-postgres-data:

networks:
  address-backend:
    driver: bridge
