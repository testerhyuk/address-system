name: address-system

services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: ${ADDRESS_DB_NAME:-address_system}
      POSTGRES_USER: ${ADDRESS_DB_USER:-address_app}
      POSTGRES_PASSWORD: ${ADDRESS_DB_PASSWORD:-address_local_password}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${ADDRESS_DB_PORT:-5432}:5432"
    volumes:
      - address-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init/001-enable-postgis.sql:/docker-entrypoint-initdb.d/001-enable-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    stop_grace_period: 30s
    shm_size: 256mb
    restart: unless-stopped
    networks:
      - address-backend

  nominatim:
    profiles:
      - osm
    image: mediagis/nominatim:5.3.2
    environment:
      PBF_URL: ${NOMINATIM_PBF_URL:-https://download.geofabrik.de/asia/south-korea-latest.osm.pbf}
      IMPORT_STYLE: address
      UPDATE_MODE: none
      IMPORT_WIKIPEDIA: "false"
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD:-nominatim_local_password}
      THREADS: ${NOMINATIM_IMPORT_THREADS:-4}
      GUNICORN_WORKERS: ${NOMINATIM_API_WORKERS:-2}
      POSTGRES_SHARED_BUFFERS: ${NOMINATIM_SHARED_BUFFERS:-1GB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${NOMINATIM_MAINTENANCE_WORK_MEM:-2GB}
      POSTGRES_AUTOVACUUM_WORK_MEM: ${NOMINATIM_AUTOVACUUM_WORK_MEM:-512MB}
      POSTGRES_WORK_MEM: ${NOMINATIM_WORK_MEM:-32MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${NOMINATIM_EFFECTIVE_CACHE_SIZE:-4GB}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${NOMINATIM_PORT:-8081}:8080"
    volumes:
      - nominatim-postgres-data:/var/lib/postgresql/16/main
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 120
      start_period: ${NOMINATIM_HEALTH_START_PERIOD:-30m}
    stop_grace_period: 60s
    shm_size: ${NOMINATIM_SHM_SIZE:-1gb}
    restart: unless-stopped
    networks:
      - address-backend

volumes:
  address-postgres-data:
  nominatim-postgres-data:

networks:
  address-backend:
    driver: bridge
